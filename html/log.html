<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'></text></svg>">
  <title>Log: {{ log_filename }}</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff8f5;
      color: #4E2A1E;
      margin: 2em;
    }
    h1, h2 {
      text-align: center;
      color: #4E2A1E;
    }
    hr {
      border: none;
      border-top: 2px solid #4E2A1E;
      margin: 0.3em auto 1em auto;
      width: 95%;
    }
    .log-container {
      max-width: 1200px;
      margin: auto;
      padding: 1.5em;
      border: 2px solid #4E2A1E;
      border-radius: 8px;
      background-color: #fdf3ef;
      padding-top: 0.5em; /* or 0 */
    }
    .log-header {
      text-align: center;
      margin-bottom: 1em;
    }
    .log-header h2 {
      margin-top: 0;
    }
    .log-header a {
      color: #4E2A1E;
      text-decoration: none;
      font-weight: bold;
    }
    .log-header a:hover {
      text-decoration: underline;
    }
    pre {
      background-color: #fff;
      border: 1px solid #4E2A1E;
      border-radius: 4px;
      padding: 1em;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
      color: inherit;
    }
    .link-buttons-row {
      display: flex;
      justify-content: center;
      gap: 1em;
      margin-top: 1em;
    }
    .link-buttons-row a {
      display: inline-block;
      padding: 0.6em 1.2em;
      background-color: #4E2A1E;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
    }
    .link-buttons-row a:hover {
      background-color: #6A3B2A;
    }
    #stop-refresh-btn {
      margin-left: 0.5em;
    }
  </style>
  <script>
  (function() {
    const refreshSeconds = {{ refresh_seconds }};
    const logFilename = {{ log_filename | tojson }};
    const isRealtime = {{ is_realtime | lower }};
    const preEl = document.querySelector('pre');
    let refreshTimer = null;
    let isStopped = false;

    async function refreshLogContent() {
      if (isStopped) return;
      try {
        const resp = await fetch('/log/' + encodeURIComponent(logFilename) + (isRealtime ? '?mode=realtime' : ''), { cache: 'no-store' });
        if (resp.ok) {
          const html = await resp.text();
          const tempDiv = document.createElement('div');
          tempDiv.innerHTML = html;
          const newPre = tempDiv.querySelector('pre');
          if (newPre) {
            preEl.innerHTML = newPre.innerHTML;
            preEl.scrollIntoView({block: 'end'});
          }
        }
      } catch (err) {
        console.info('Failed to refresh log content:', err);
      }
    }

    function toggleAutoRefresh() {
      const btn = document.getElementById('stop-refresh-btn');
      if (isStopped) {
        isStopped = false;
        btn.textContent = 'Pause auto-refresh';
        btn.style.backgroundColor = '#4E2A1E';
        refreshTimer = setInterval(refreshLogContent, refreshSeconds * 1000);
      } else {
        isStopped = true;
        btn.textContent = 'Resume auto-refresh';
        btn.style.backgroundColor = '#6A3B2A';
        clearInterval(refreshTimer);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      preEl.scrollIntoView({block: 'end'});
      const btn = document.getElementById('stop-refresh-btn');
      if (btn) {
        btn.addEventListener('click', toggleAutoRefresh);
      }
      refreshTimer = setInterval(refreshLogContent, refreshSeconds * 1000);
    });

    window.addEventListener('beforeunload', () => {
      if (refreshTimer) clearInterval(refreshTimer);
    });
  })();
  </script>
</head>
<body>
  <div class="log-container">
    <div class="log-header">
      <h2>Log: <a href="/download/log/{{ log_filename }}" target="_blank">{{ log_filename }}</a></h2>
    </div>
    <pre>{{ tail | safe }}</pre>
  </div>

  <div class="link-buttons-row">
    {% if is_realtime %}
    <button type="button" id="stop-refresh-btn" style="display: inline-block; padding: 0.6em 1.2em; background-color: #4E2A1E; color: #fff; text-decoration: none; border: none; border-radius: 4px; cursor: pointer; font-size: 1em;">Pause auto-refresh</button>
    {% else %}
    <a href="/">Back to Main</a>
    <button type="button" id="stop-refresh-btn" style="display: inline-block; padding: 0.6em 1.2em; background-color: #4E2A1E; color: #fff; text-decoration: none; border: none; border-radius: 4px; cursor: pointer; font-size: 1em;">Pause auto-refresh</button>
    {% endif %}
  </div>
</body>
</html>
